<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極資產風險管理系統</title>
    <style>
        :root { --primary: #2c3e50; --safe: #27ae60; --warn: #f39c12; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        
        /* 按鈕樣式 */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-add { background: var(--primary); }
        .btn-save { background: var(--safe); }
        .btn-export { background: #3498db; }
        .btn-import { background: #9b59b6; }
        .btn-danger { background: var(--danger); }
        .btn:hover { opacity: 0.8; }

        /* 壓力測試滑桿 */
        .stress-test { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ffeeba; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 0.9em; position: sticky; top: 0; }
        td { border: 1px solid #eee; padding: 8px; text-align: center; }
        input { width: 85%; padding: 5px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        
        /* 數值高亮 */
        .val-ltv { color: #2980b9; font-weight: bold; }
        .val-warn { color: #d35400; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 12px; color: white; font-size: 0.8em; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .summary-card { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .summary-card h4 { margin: 0; color: #7f8c8d; font-size: 0.9em; }
        .summary-card p { margin: 5px 0 0; font-size: 1.4em; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>資產風險監控與壓力測試系統</h1>
        <div id="saveStatus" style="color: var(--safe); font-weight: bold;">● 資料已自動儲存</div>
    </div>

    <!-- 數據概覽 -->
    <div class="summary-grid">
        <div class="summary-card"><h4>總現值</h4><p id="totalPV">0</p></div>
        <div class="summary-card"><h4>總借款</h4><p id="totalLoan">0</p></div>
        <div class="summary-card"><h4>整體 LTV</h4><p id="avgLTV">0%</p></div>
        <div class="summary-card"><h4>風險資產比例</h4><p id="riskRatio" style="color: var(--danger);">0%</p></div>
    </div>

    <!-- 壓力測試 -->
    <div class="stress-test">
        <strong>🔥 市場壓力測試模擬：</strong> 假設市場集體下跌 
        <input type="range" id="marketCrash" min="0" max="60" value="0" style="width: 200px; vertical-align: middle;">
        <span id="crashVal" style="color: var(--danger); font-size: 1.2em; font-weight: bold;">0%</span>
        <span style="margin-left: 15px; font-size: 0.9em; color: #666;">(模擬價格波動對安全等級的影響)</span>
    </div>

    <!-- 工具欄 -->
    <div class="toolbar">
        <button class="btn btn-add" onclick="addRow()">+ 新增項目</button>
        <button class="btn btn-export" onclick="exportExcel()">匯出 CSV (Excel)</button>
        <button class="btn btn-export" onclick="exportJSON()">備份資料 (JSON)</button>
        <button class="btn btn-import" onclick="document.getElementById('importFile').click()">匯入資料</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
        <button class="btn btn-danger" onclick="clearAll()" style="margin-left: auto;">清空所有資料</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="12%">資產名稱</th>
                <th width="10%">原始現值(萬)</th>
                <th width="10%">模擬現值(萬)</th>
                <th width="10%">借款額(萬)</th>
                <th width="8%">警戒線比</th>
                <th width="8%">斷頭線比</th>
                <th width="8%">LTV%</th>
                <th width="10%">抗跌補繳%</th>
                <th width="12%">安全等級</th>
                <th width="6%">操作</th>
            </tr>
        </thead>
        <tbody id="assetBody"></tbody>
    </table>
</div>

<script>
    let assets = JSON.parse(localStorage.getItem('myAssets')) || [
        { name: "A保單", pv: 50.6, loan: 15, warn: 0.8, dead: 0.9 },
        { name: "B保單", pv: 155, loan: 50, warn: 0.8, dead: 0.9 },
        { name: "C保單", pv: 203, loan: 79, warn: 0.8, dead: 0.9 },
        { name: "D保單", pv: 400, loan: 100, warn: 0.6, dead: 0.7 },
        { name: "股票質押", pv: 240, loan: 50, warn: 0.7, dead: 0.8 }
    ];

    const crashSlider = document.getElementById('marketCrash');
    crashSlider.oninput = function() {
        document.getElementById('crashVal').innerText = this.value + "%";
        renderTable();
    };

    function renderTable() {
        const tbody = document.getElementById("assetBody");
        const crashPercent = parseFloat(crashSlider.value) / 100;
        tbody.innerHTML = "";

        let totalPV = 0;
        let totalLoan = 0;
        let riskCount = 0;

        assets.forEach((item, index) => {
            const simulatedPV = item.pv * (1 - crashPercent);
            const ltv = (item.loan / simulatedPV) * 100;
            const dropWarn = (1 - (item.loan / item.warn / item.pv)) * 100; // 基準以原始現值算
            const currentDropWarn = (1 - (item.loan / item.warn / simulatedPV)) * 100; // 模擬下的剩餘空間

            totalPV += simulatedPV;
            totalLoan += item.loan;

            let grade = "A級";
            let badgeCls = "var(--safe)";
            if (ltv >= 60 || currentDropWarn <= 0) {
                grade = "C級 (補繳/斷頭)"; badgeCls = "var(--danger)"; riskCount++;
            } else if (ltv > 40 || currentDropWarn < 25) {
                grade = "B級 (中風險)"; badgeCls = "var(--warn)";
            }

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="text" value="${item.name}" onchange="updateData(${index}, 'name', this.value)"></td>
                <td><input type="number" value="${item.pv}" onchange="updateData(${index}, 'pv', this.value)"></td>
                <td style="background:#fef9e7">${simulatedPV.toFixed(1)}</td>
                <td><input type="number" value="${item.loan}" onchange="updateData(${index}, 'loan', this.value)"></td>
                <td><input type="number" value="${item.warn}" step="0.1" onchange="updateData(${index}, 'warn', this.value)"></td>
                <td><input type="number" value="${item.dead}" step="0.1" onchange="updateData(${index}, 'dead', this.value)"></td>
                <td class="val-ltv">${ltv.toFixed(1)}%</td>
                <td class="val-warn">${currentDropWarn.toFixed(1)}%</td>
                <td><span class="badge" style="background:${badgeCls}">${grade}</span></td>
                <td><button class="btn btn-danger" style="padding:2px 5px" onclick="deleteRow(${index})">✕</button></td>
            `;
            tbody.appendChild(tr);
        });

        // 更新概覽
        document.getElementById('totalPV').innerText = totalPV.toFixed(1) + " 萬";
        document.getElementById('totalLoan').innerText = totalLoan.toFixed(1) + " 萬";
        document.getElementById('avgLTV').innerText = ((totalLoan/totalPV)*100).toFixed(1) + "%";
        document.getElementById('riskRatio').innerText = ((riskCount/assets.length)*100).toFixed(0) + "%";
        
        localStorage.setItem('myAssets', JSON.stringify(assets));
    }

    function updateData(index, key, value) {
        assets[index][key] = key === 'name' ? value : parseFloat(value);
        renderTable();
    }

    function addRow() {
        assets.push({ name: "新資產", pv: 100, loan: 30, warn: 0.8, dead: 0.9 });
        renderTable();
    }

    function deleteRow(index) {
        if(confirm("確定刪除？")) {
            assets.splice(index, 1);
            renderTable();
        }
    }

    // 匯出 CSV (Excel)
    function exportExcel() {
        let csv = "\ufeff項目名稱,原始現值,借款額,警戒比率,斷頭比率,LTV%\n";
        assets.forEach(a => {
            csv += `${a.name},${a.pv},${a.loan},${a.warn},${a.dead},${((a.loan/a.pv)*100).toFixed(1)}%\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "資產風險報告.csv";
        link.click();
    }

    // 匯出 JSON
    function exportJSON() {
        const data = JSON.stringify(assets, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "資產備份.json";
        link.click();
    }

    // 匯入 JSON
    function importJSON(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            assets = JSON.parse(e.target.result);
            renderTable();
        };
        reader.readAsText(event.target.files[0]);
    }

    function clearAll() {
        if(confirm("這將刪除所有儲存的資料，確定嗎？")) {
            assets = [];
            renderTable();
        }
    }

    window.onload = renderTable;
</script>

</body>
</html>
