<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移倉系統 V8 - 手機優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f1f5f9; user-select: none; }
        .safe-area-inset-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .item-card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; transition: transform 0.1s active; }
        .item-card:active { transform: scale(0.98); }
        .input-num { background: #0f172a; border: 1px solid #334155; color: #38bdf8; text-align: center; font-weight: 900; }
        .stepper-btn { background: #334155; color: white; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-48">

    <!-- 頂部狀態欄 -->
    <header class="sticky top-0 z-50 p-4 glass">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <h1 class="text-lg font-black text-blue-400 leading-none">移倉作業 V8</h1>
                <p id="saveStatus" class="text-[9px] text-slate-500 font-bold mt-1 uppercase">Ready for Transfer</p>
            </div>
            <div class="flex gap-2">
                <button onclick="switchTab('today')" id="tabToday" class="px-4 py-2 rounded-full text-xs font-black transition bg-blue-600 text-white shadow-lg shadow-blue-500/30">今日</button>
                <button onclick="switchTab('tomorrow')" id="tabTomorrow" class="px-4 py-2 rounded-full text-xs font-black transition text-slate-400">明日</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- 區塊一：車輛與安檢 (僅今日) -->
        <section id="sectionVehicle" class="space-y-4">
            <div class="flex gap-3">
                <div class="flex-1 bg-slate-800 p-4 rounded-3xl border border-slate-700">
                    <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-widest">車牌號碼</p>
                    <input type="text" id="carPlate" placeholder="點擊輸入" class="w-full bg-transparent text-xl font-black text-white focus:outline-none uppercase">
                </div>
                <button id="btnDamage" onclick="toggleDamage()" class="w-24 rounded-3xl border-2 border-slate-700 flex flex-col items-center justify-center transition">
                    <span id="dmgIcon" class="text-xl">✅</span>
                    <span id="dmgText" class="text-[9px] font-bold text-slate-400 mt-1 uppercase">無損</span>
                </button>
            </div>

            <!-- 拍照按鈕 (簡化版) -->
            <div class="grid grid-cols-3 gap-2">
                <label class="bg-slate-800 aspect-square rounded-2xl border border-slate-700 flex flex-col items-center justify-center relative overflow-hidden">
                    <span class="text-xs font-bold text-slate-500">拍車頭</span>
                    <input type="file" capture="environment" class="hidden" onchange="handleImg(this)">
                    <img class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
                <label class="bg-slate-800 aspect-square rounded-2xl border border-slate-700 flex flex-col items-center justify-center relative overflow-hidden">
                    <span class="text-xs font-bold text-slate-500">拍損壞</span>
                    <input type="file" capture="environment" class="hidden" onchange="handleImg(this)">
                    <img class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
                <label class="bg-slate-800 aspect-square rounded-2xl border border-slate-700 flex flex-col items-center justify-center relative overflow-hidden">
                    <span class="text-xs font-bold text-slate-500">拍簽單</span>
                    <input type="file" capture="environment" class="hidden" onchange="handleImg(this)">
                    <img class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
            </div>
        </section>

        <!-- 區塊二：清單 -->
        <div class="flex justify-between items-center">
            <h2 id="listTitle" class="text-sm font-black text-slate-500 uppercase tracking-widest">今日明細</h2>
            <button onclick="showSearch()" class="bg-blue-600 px-5 py-3 rounded-2xl text-xs font-black shadow-lg shadow-blue-500/40 active:scale-95 transition">＋ 新增品項</button>
        </div>

        <div id="itemList" class="space-y-4">
            <!-- 項目動態載入 -->
        </div>

    </main>

    <!-- 底部懸浮統計欄 (大拇指區域) -->
    <div class="fixed bottom-0 left-0 right-0 p-4 safe-area-inset-bottom z-50 max-w-md mx-auto">
        <div class="glass rounded-[32px] p-5 shadow-2xl border border-white/10">
            <div class="flex justify-around items-center mb-4">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">總件數 BOX</p>
                    <span id="sumQty" class="text-2xl font-black text-blue-400">0</span>
                </div>
                <div class="w-[1px] h-8 bg-slate-700"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">總板數 PLT</p>
                    <span id="sumPlt" class="text-2xl font-black text-emerald-400">0</span>
                </div>
                <div class="w-[1px] h-8 bg-slate-700"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">進度</p>
                    <span id="progress" class="text-2xl font-black text-white">0%</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="shareReport()" class="flex-[3] bg-blue-600 py-4 rounded-2xl font-black text-sm active:scale-95 transition">🚀 發送報表</button>
                <button onclick="exportCSV()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-xs active:scale-95 transition text-slate-400">CSV</button>
            </div>
        </div>
    </div>

    <!-- 全螢幕搜尋彈窗 -->
    <div id="searchModal" class="fixed inset-0 bg-slate-900 z-[100] hidden flex flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black">選擇移撥商品</h3>
            <button onclick="hideSearch()" class="text-slate-400 text-2xl">✕</button>
        </div>
        <input type="text" id="searchInput" oninput="filterItems(this.value)" placeholder="輸入關鍵字 (如: 蛋糕, 牛...)" class="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 focus:border-blue-500 focus:outline-none mb-4">
        <div id="searchList" class="flex-1 overflow-y-auto space-y-2">
            <!-- 搜尋結果 -->
        </div>
    </div>

    <script>
        const masterData = [
            { id: "24601003001", name: "冷凍美國CR安格斯牛五花火鍋片", qpp: 30, loc: "1C2903", exp: "20261222" },
            { id: "24200002001", name: "威保 - 冷凍紐西蘭 - 全羊火鍋肉", qpp: 30, loc: "1C3303", exp: "20270202" },
            { id: "24600105001", name: "立大冷凍豬五花火鍋肉片1000G", qpp: 50, loc: "3B0301", exp: "20270130" },
            { id: "23904988001", name: "立基 - 冷凍9吋 油酥厚餅", qpp: 28, loc: "3B0501", exp: "20270128" },
            { id: "24200074001", name: "舍利蓮冷凍紐西蘭小羔羊梅花肉", qpp: 49, loc: "3B1301", exp: "20270131" },
            { id: "24600005001", name: "思牧 - 冷凍豬五花火鍋片500G", qpp: 35, loc: "3B1401", exp: "20270210" },
            { id: "23904009001", name: "泉泓起酥蛋糕(家庭號)", qpp: 24, loc: "3B3901", exp: "20260901" },
            { id: "24601107001", name: "美國CR安格斯牛 五花火鍋片1", qpp: 32, loc: "3B4102", exp: "20261218" },
            { id: "23904125001", name: "泉泓冷凍蜂蜜蛋糕", qpp: 28, loc: "3B4702", exp: "20260902" },
            { id: "23904040001", name: "泉泓起酥蛋糕", qpp: 28, loc: "3B4801", exp: "20260903" },
            { id: "24601108001", name: "舍利蓮冷凍澳洲穀飼 - 牛雪花肉", qpp: 49, loc: "4B0701", exp: "20270131" },
            { id: "24600001001", name: "思牧 - 冷凍豬梅花火鍋片500G", qpp: 35, loc: "4B1401", exp: "20270210" },
            { id: "24920267001", name: "威保 - 美國冷凍去骨腿排", qpp: 42, loc: "4B1802", exp: "20270202" }
        ];

        let currentTab = 'today';
        let data = { today: [], tomorrow: [] };
        let hasDamage = false;

        window.onload = () => {
            const saved = localStorage.getItem('wh_v8_data');
            if (saved) data = JSON.parse(saved);
            renderList();
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabToday').className = tab === 'today' ? 'px-4 py-2 rounded-full text-xs font-black transition bg-blue-600 text-white' : 'px-4 py-2 rounded-full text-xs font-black transition text-slate-400';
            document.getElementById('tabTomorrow').className = tab === 'tomorrow' ? 'px-4 py-2 rounded-full text-xs font-black transition bg-blue-600 text-white' : 'px-4 py-2 rounded-full text-xs font-black transition text-slate-400';
            document.getElementById('sectionVehicle').style.display = tab === 'today' ? 'block' : 'none';
            document.getElementById('listTitle').innerText = tab === 'today' ? '今日明細' : '明日預排';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            data[currentTab].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `item-card p-5 ${item.done ? 'opacity-40 grayscale-[0.5]' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="font-black text-white text-lg leading-tight mb-1">${item.name}</h3>
                            <div class="flex gap-2">
                                <span class="text-[9px] font-bold px-2 py-0.5 bg-slate-700 rounded text-slate-400">${item.loc}</span>
                                <span class="text-[9px] font-bold px-2 py-0.5 bg-blue-900/30 rounded text-blue-400">EXP: ${item.exp}</span>
                            </div>
                        </div>
                        <button onclick="removeItem(${index})" class="text-slate-600 p-2 ml-2">✕</button>
                    </div>

                    <div class="flex items-center gap-4">
                        <!-- 板數 Stepper -->
                        <div class="flex-1">
                            <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-tighter">板數 Pallets</p>
                            <div class="flex items-center gap-2">
                                <button onclick="changePlt(${index}, -1)" class="stepper-btn">-</button>
                                <input type="number" inputmode="numeric" value="${item.plt}" onchange="updateItem(${index}, 'plt', this.value)" class="w-full h-[44px] rounded-xl input-num">
                                <button onclick="changePlt(${index}, 1)" class="stepper-btn">+</button>
                            </div>
                        </div>
                        <!-- 總箱數 -->
                        <div class="w-1/3 text-right">
                            <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-tighter text-right">總箱數 Boxes</p>
                            <input type="number" inputmode="numeric" value="${item.qty}" onchange="updateItem(${index}, 'qty', this.value)" class="w-full h-[44px] rounded-xl input-num border-blue-500/30 text-blue-400">
                        </div>
                        <!-- 完成勾選 -->
                        <button onclick="toggleDone(${index})" class="w-12 h-12 rounded-2xl border-2 ${item.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-700'} flex items-center justify-center transition">
                            ${item.done ? '✅' : ''}
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
            updateStats();
            saveToLocal();
        }

        // Stepper 功能
        function changePlt(index, val) {
            const itm = data[currentTab][index];
            itm.plt = Math.max(0, Number(itm.plt) + val);
            if(itm.qpp) itm.qty = itm.plt * itm.qpp;
            renderList();
        }

        // 搜尋功能
        function showSearch() { document.getElementById('searchModal').classList.remove('hidden'); filterItems(''); }
        function hideSearch() { document.getElementById('searchModal').classList.add('hidden'); }

        function filterItems(kw) {
            const list = document.getElementById('searchList');
            list.innerHTML = '';
            masterData.filter(m => m.name.includes(kw) || m.id.includes(kw)).forEach(m => {
                const b = document.createElement('button');
                b.className = "w-full p-4 bg-slate-800 rounded-2xl text-left border border-slate-700 active:bg-blue-900 transition";
                b.innerHTML = `<p class="font-bold text-sm">${m.name}</p><p class="text-[10px] text-slate-500">${m.id} | 每板 ${m.qpp} 箱</p>`;
                b.onclick = () => { 
                    data[currentTab].unshift({...m, plt: 1, done: false }); 
                    hideSearch(); 
                    renderList(); 
                };
                list.appendChild(b);
            });
        }

        function updateItem(index, field, val) {
            data[currentTab][index][field] = Number(val);
            updateStats();
            saveToLocal();
        }

        function toggleDone(index) {
            data[currentTab][index].done = !data[currentTab][index].done;
            renderList();
        }

        function removeItem(index) {
            if(confirm('確定移除？')) { data[currentTab].splice(index, 1); renderList(); }
        }

        function updateStats() {
            let q = 0, p = 0, d = 0;
            data.today.forEach(i => {
                q += Number(i.qty); p += Number(i.plt);
                if(i.done) d++;
            });
            document.getElementById('sumQty').innerText = q;
            document.getElementById('sumPlt').innerText = p;
            document.getElementById('progress').innerText = data.today.length ? Math.round((d / data.today.length) * 100) + '%' : '0%';
        }

        function toggleDamage() {
            hasDamage = !hasDamage;
            const btn = document.getElementById('btnDamage');
            document.getElementById('dmgIcon').innerText = hasDamage ? '⚠️' : '✅';
            document.getElementById('dmgText').innerText = hasDamage ? '損壞' : '無損';
            btn.className = hasDamage ? "w-24 rounded-3xl border-2 border-red-500 bg-red-500/10 flex flex-col items-center justify-center" : "w-24 rounded-3xl border-2 border-slate-700 flex flex-col items-center justify-center";
        }

        function handleImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = input.parentElement.querySelector('img');
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveToLocal() {
            localStorage.setItem('wh_v8_data', JSON.stringify(data));
            document.getElementById('saveStatus').innerText = "Last Saved: " + new Date().toLocaleTimeString();
        }

        async function shareReport() {
            const plate = document.getElementById('carPlate').value;
            const msg = `【移倉報表 V8】\n車牌: ${plate || '未填'}\n安檢: ${hasDamage ? '⚠️有損損' : '✅正常'}\n總計: ${document.getElementById('sumQty').innerText} 箱 / ${document.getElementById('sumPlt').innerText} 板\n進度: ${document.getElementById('progress').innerText}`;
            if (navigator.share) await navigator.share({ title: 'WH Rep', text: msg });
            else alert('已複製文字');
        }

        function exportCSV() {
            let csv = "\ufeff頁籤,品名,儲位,有效期,板數,總箱數\n";
            ['today', 'tomorrow'].forEach(t => data[t].forEach(i => csv += `${t},${i.name},${i.loc},${i.exp},${i.plt},${i.qty}\n`));
            const blob = new Blob([csv],
