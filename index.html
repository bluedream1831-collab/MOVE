<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移倉排程安檢系統 V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: bold; }
        .photo-slot { aspect-ratio: 4/3; background: #fff; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .item-card { transition: all 0.2s; }
        .item-done { opacity: 0.6; background-color: #f1f5f9 !important; border-left: 4px solid #94a3b8 !important; }
    </style>
</head>
<body class="pb-40">

    <!-- 頂部控制台 -->
    <header class="bg-indigo-800 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black">倉庫移倉核心系統</h1>
            <span id="saveStatus" class="text-[10px] bg-indigo-600 px-2 py-1 rounded">資料已加密儲存</span>
        </div>
        <!-- 頁籤切換 -->
        <div class="flex bg-indigo-900/50 rounded-lg p-1">
            <button onclick="switchTab('today')" id="tabToday" class="flex-1 py-2 text-sm rounded-md transition tab-active">今日作業</button>
            <button onclick="switchTab('tomorrow')" id="tabTomorrow" class="flex-1 py-2 text-sm rounded-md transition text-indigo-300">明日預排</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- 1. 車輛安檢與進場 (僅今日顯示) -->
        <section id="sectionVehicle" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-800 flex items-center">🚚 車輛與單據紀錄</h2>
                <span class="text-xs text-slate-400" id="currentDateDisplay"></span>
            </div>
            <input type="text" id="carPlate" placeholder="請輸入出貨車牌" class="w-full text-lg font-bold p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 uppercase">
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setDamage(false)" id="btnNoDamage" class="py-2 rounded-lg border-2 border-green-500 text-green-600 font-bold text-sm">✅ 外觀正常</button>
                <button onclick="setDamage(true)" id="btnHasDamage" class="py-2 rounded-lg border-2 border-slate-200 text-slate-400 font-bold text-sm">⚠️ 有凹箱/損壞</button>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-2">
                <label class="photo-slot"><span class="text-[10px] text-slate-400">拍車頭</span><input type="file" capture="environment" class="hidden" onchange="previewImg(this)"></label>
                <label class="photo-slot"><span class="text-[10px] text-slate-400">拍損壞</span><input type="file" capture="environment" class="hidden" onchange="previewImg(this)"></label>
                <label class="photo-slot"><span class="text-[10px] text-slate-400">拍簽單</span><input type="file" capture="environment" class="hidden" onchange="previewImg(this)"></label>
            </div>
        </section>

        <!-- 2. 商品清單管理 -->
        <section class="space-y-3">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="font-bold text-slate-800" id="listTitle">今日移撥明細</h2>
                    <p class="text-xs text-slate-500">進度: <span id="progressText">0/0</span></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="addItem()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm">+ 新增品項</button>
                </div>
            </div>

            <!-- 清單容器 -->
            <div id="itemList" class="space-y-3">
                <!-- 項目將由 JS 動態產生 -->
            </div>
        </section>

    </main>

    <!-- 底部動作條 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md p-4 shadow-[0_-10px_25px_rgba(0,0,0,0.1)] z-50 max-w-md mx-auto border-t border-slate-100">
        <div class="flex justify-between items-center mb-3">
            <div class="text-xs">
                今日合計: <b class="text-indigo-600 text-sm" id="sumQty">0</b> 件 / <b class="text-green-600 text-sm" id="sumPlt">0</b> 板
            </div>
            <button onclick="resetData()" class="text-slate-400 text-xs underline">重置所有資料</button>
        </div>
        <div class="flex gap-3">
            <button onclick="shareReport()" class="flex-[2] bg-slate-900 text-white py-4 rounded-2xl font-bold flex justify-center items-center gap-2 shadow-lg active:scale-95 transition">
                🚀 完成並傳送園區報表
            </button>
            <button onclick="exportCSV()" class="flex-1 bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-2xl font-bold text-sm shadow-sm active:scale-95 transition">
                Excel存檔
            </button>
        </div>
    </div>

    <script>
        let currentTab = 'today';
        let data = {
            today: [],
            tomorrow: []
        };
        let carStatus = { plate: '', hasDamage: false, damageNote: '' };

        // 初始化
        window.onload = () => {
            const saved = localStorage.getItem('warehouse_v4_data');
            if (saved) data = JSON.parse(saved);
            
            const savedCar = localStorage.getItem('warehouse_v4_car');
            if (savedCar) {
                carStatus = JSON.parse(savedCar);
                document.getElementById('carPlate').value = carStatus.plate;
                setDamage(carStatus.hasDamage);
            }

            document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString();
            renderList();
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabToday').className = tab === 'today' ? 'flex-1 py-2 text-sm rounded-md transition tab-active bg-white text-indigo-700 shadow-sm' : 'flex-1 py-2 text-sm rounded-md transition text-indigo-200';
            document.getElementById('tabTomorrow').className = tab === 'tomorrow' ? 'flex-1 py-2 text-sm rounded-md transition tab-active bg-white text-indigo-700 shadow-sm' : 'flex-1 py-2 text-sm rounded-md transition text-indigo-200';
            
            document.getElementById('listTitle').innerText = tab === 'today' ? '今日移撥明細' : '明日預排明細';
            document.getElementById('sectionVehicle').style.display = tab === 'today' ? 'block' : 'none';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('itemList');
            list.innerHTML = '';
            const items = data[currentTab];

            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `item-card bg-white p-4 rounded-2xl shadow-sm border border-slate-200 relative ${item.done ? 'item-done' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1">
                            <input type="text" value="${item.name}" onchange="updateItem(${index}, 'name', this.value)" placeholder="品名 / ITEM" class="w-full font-bold text-slate-800 bg-transparent border-b border-transparent focus:border-indigo-300 focus:outline-none">
                            <div class="flex gap-2 mt-1">
                                <input type="text" value="${item.loc}" onchange="updateItem(${index}, 'loc', this.value)" placeholder="儲位" class="text-[10px] w-16 p-1 bg-slate-100 rounded">
                                <input type="text" value="${item.exp}" onchange="updateItem(${index}, 'exp', this.value)" placeholder="有效期" class="text-[10px] w-24 p-1 bg-slate-100 rounded font-mono text-blue-600">
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <div class="flex items-center gap-1">
                                <span class="text-[10px] text-slate-400">移撥</span>
                                <input type="number" value="${item.qty}" onchange="updateItem(${index}, 'qty', this.value)" class="w-14 text-center font-bold text-indigo-600 border rounded">
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-[10px] text-slate-400">板數</span>
                                <input type="number" value="${item.plt}" onchange="updateItem(${index}, 'plt', this.value)" class="w-14 text-center font-bold text-green-600 border rounded">
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-2 pt-2 border-t border-slate-50">
                        <label class="flex items-center gap-2 text-xs text-slate-500">
                            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDone(${index})" class="w-4 h-4 rounded"> ${item.done ? '已完成' : '核對中'}
                        </label>
                        <div class="flex gap-2">
                            <button onclick="moveTask(${index})" class="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-600 font-bold">
                                ➔ 移至${currentTab === 'today' ? '明日' : '今日'}
                            </button>
                            <button onclick="removeItem(${index})" class="text-red-400 p-1">✕</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });

            calcTotals();
            saveToLocal();
        }

        // 核心邏輯功能
        function addItem() {
            data[currentTab].unshift({ name: '', loc: '', exp: '', qty: 0, plt: 1, done: false });
            renderList();
        }

        function updateItem(index, field, value) {
            data[currentTab][index][field] = value;
            saveToLocal();
            calcTotals();
        }

        function toggleDone(index) {
            data[currentTab][index].done = !data[currentTab][index].done;
            renderList();
        }

        function moveTask(index) {
            const target = currentTab === 'today' ? 'tomorrow' : 'today';
            const item = data[currentTab].splice(index, 1)[0];
            data[target].push(item);
            renderList();
        }

        function removeItem(index) {
            if(confirm('確定刪除？')) {
                data[currentTab].splice(index, 1);
                renderList();
            }
        }

        function setDamage(status) {
            carStatus.hasDamage = status;
            document.getElementById('btnNoDamage').className = status ? "py-2 rounded-lg border-2 border-slate-200 text-slate-400 font-bold text-sm" : "py-2 rounded-lg border-2 border-green-500 text-green-600 font-bold text-sm";
            document.getElementById('btnHasDamage').className = status ? "py-2 rounded-lg border-2 border-red-500 text-red-600 font-bold text-sm bg-red-50" : "py-2 rounded-lg border-2 border-slate-200 text-slate-400 font-bold text-sm";
            saveToLocal();
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    let img = input.parentElement.querySelector('img') || document.createElement('img');
                    img.src = e.target.result;
                    input.parentElement.appendChild(img);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function calcTotals() {
            const items = data.today;
            let q = 0, p = 0, d = 0;
            items.forEach(i => {
                q += Number(i.qty);
                p += Number(i.plt);
                if(i.done) d++;
            });
            document.getElementById('sumQty').innerText = q;
            document.getElementById('sumPlt').innerText = p;
            document.getElementById('progressText').innerText = `${d}/${items.length}`;
        }

        function saveToLocal() {
            localStorage.setItem('warehouse_v4_data', JSON.stringify(data));
            carStatus.plate = document.getElementById('carPlate').value;
            localStorage.setItem('warehouse_v4_car', JSON.stringify(carStatus));
        }

        function resetData() {
            if(confirm('注意！這將清空所有今日與明日的紀錄，確定嗎？')) {
                localStorage.clear();
                location.reload();
            }
        }

        async function shareReport() {
            const plate = document.getElementById('carPlate').value;
            if(!plate) { alert('請填寫車牌再回報！'); return; }
            
            const msg = `【移倉離場回報】\n日期: ${new Date().toLocaleDateString()}\n車牌: ${plate}\n外觀: ${carStatus.hasDamage ? '⚠️損壞' : '✅正常'}\n----------------\n今日移撥總計: ${document.getElementById('sumQty').innerText} 件 / ${document.getElementById('sumPlt').innerText} 板\n進度: ${document.getElementById('progressText').innerText}\n明日待辦: ${data.tomorrow.length} 項\n\n(單據與車體照片已記錄)`;

            if (navigator.share) {
                await navigator.share({ title: '移倉報表', text: msg });
            } else {
                navigator.clipboard.writeText(msg);
                alert('報表內容已複製，請貼上到 LINE 並手動傳送照片。');
            }
        }

        function exportCSV() {
            let csv = "\ufeff頁籤,儲位,ITEM/品名,數量,板數,有效日期,狀態\n";
            ['today', 'tomorrow'].forEach(tab => {
                data[tab].forEach(i => {
                    csv += `${tab === 'today' ? '今日' : '明日'},${i.loc},${i.name},${i.qty},${i.plt},${i.exp},${i.done ? '完成' : '待辦'}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `移倉紀錄_全_${new Date().getTime()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
